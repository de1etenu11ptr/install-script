function get_current_line() {
	const error = new Error()
	const stack_lines = error.stack.split('\n')

	const caller_line = stack_lines[2] || ''

	/* gets `:n:n` from `^.*:n:n$' */
	const match = caller_line.match(/:(\d+):\d+\)?$/)
	return match ? String(parseInt(match[1]) + 1) : 'Unknown'
}

function cassert(bool, msg = 'generic assert fail', line = 'Unknown') {
	if (!bool) {
		throw new Error(msg, 'firefox.cfg', line)
	}
}

function cerror(msg, line = 'Unknown') {
	if (typeof msg != 'string') {
		cerror(
			'passed an object to the cerror() function',
			typeof line == 'string' ? line : 'Unknown'
		)
		return
	} else {
		if (line == '' && msg == '') {
			pref('_overrides.lightwork.errors', '')
		} else {
			pref(
				'_overrides.lightwork.errors',
				`error: ${msg} (lineno: ${line})`
			)
		}
	}
}

function sassert(bool, msg = 'generic soft assert fail', line = 'Unknown') {
	if (!bool) {
		cerror(msg, line)
	}
}

function clog(msg, line = 'Unknown') {
	if (typeof msg != 'string') {
		cerror(
			'passed an object to the clog() function',
			typeof line == 'string' ? line : 'Unknown'
		)
		return
	} else {
		if (line == '' && msg == '') {
			pref('_overrides.lightwork.logs', '')
		} else {
			pref(
				'_overrides.lightwork.logs',
				`log: ${msg} (lineno: ${line})`
			)
		}
	}
}

function get_firefox_parent_dir_path() {
	try {
		/* there is also a profile service given by '@mozilla.org/toolkit/profile-service;1' */
		let dir_service = Components.classes[
			'@mozilla.org/file/directory_service;1'
		].getService(Components.interfaces.nsIProperties)
		let profile_dir = dir_service.get(
			'ProfD',
			Components.interfaces.nsIFile
		)
		return profile_dir.parent.path
	} catch (e) {
		cerror(
			(e.message + ' ' || '') +
				'failed to get firefox profile parent directory',
			get_current_line()
		)
		return null
	}
}

function set_firefox_current_profile() {
	try {
		let profile_service = Components.classes[
			'@mozilla.org/toolkit/profile-service;1'
		].getService(Components.interfaces.nsIToolkitProfileService)
		let dir_service = Components.classes[
			'@mozilla.org/file/directory_service;1'
		].getService(Components.interfaces.nsIProperties)

		current_profile_dir = dir_service.get(
			'ProfD',
			Components.interfaces.nsIFile
		)

		for (let profile of profile_service.profiles) {
			/*
			// profile_service.profiles returns an enumerator and in newer firefox versions, it already yields getNext()
			let profile = profiles
				.getNext()
				.queryInterface(
					Components.interfaces.nsIToolkitProfile
				)
			*/
			if (profile.rootDir.equals(current_profile_dir)) {
				current_profile_name = profile.name
				break
			}
		}
	} catch (e) {
		cerror(
			(e.message + ' ' || '') +
				'failed to set firefox profile',
			get_current_line()
		)
	}
}

function configure_startup() {
