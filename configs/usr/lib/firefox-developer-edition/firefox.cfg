	lockPref('browser.aboutConfig.showWarning', false)
	/* 0=blank, 1=home, 2=last visited page, 3=resume previous session */
	lockPref('browser.startup.page', 3)
	if (current_profile_name === 'home') {
		lockPref(
			'browser.startup.homepage',
			'about:config|about:performance|about:memory'
		)
	} else if (current_profile_name === 'work') {
		lockPref(
			'browser.startup.homepage',
			'about:performance|about:memory|about:config'
		)
	}
}

