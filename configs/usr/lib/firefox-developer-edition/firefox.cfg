const CCSLDS = new Set([
	'co.uk',
	'com.au',
	'co.jp',
	'co.nz',
	'co.za',
	'org.uk',
	'me.uk',
	'co.za',
])

function get_base_domain(hostname) {
	let parts = hostname.split('.')
	let last2 = parts.slice(-2).join('.')
	if (CCSLDS.has(last2)) return parts.slice(-3).join('.')
	return last2
}

function url_matches(spec, pattern) {
	try {
		spec = spec.replace(/\/$/g, '')
		pattern = pattern.replace(/\/$/g, '')
		let su = Services.io.newURI(spec)
		let pu = Services.io.newURI(pattern)

		if (
			!/^https?$/.test(pu.scheme) ||
			!/^https?$/.test(su.scheme)
		) {
			return spec === pattern
		}

		return get_base_domain(su.host) === get_base_domain(pu.host)
	} catch (e) {
		pref(
			'_overrides.lightwork.url_errors',
			(e.message || 'failed at url parsing') +
				` ["${spec}", "${pattern}"]`
		)
		return spec === pattern
	}
}

function post_load_handler(e) {
	let domWindow = e.currentTarget
	domWindow.removeEventListener('load', post_load_handler, false)

	let SsManager = Components.classes[
		'@mozilla.org/scriptsecuritymanager;1'
	].getService(Components.interfaces.nsIScriptSecurityManager)

	/* See: https://searchfox.org/firefox-main/source/browser/components/tabbrowser/content/tabbrowser.js */

	domWindow.setTimeout(() => {
		let gBrowser = domWindow.gBrowser
		if (!gBrowser) return
		let current_tab = domWindow.gBrowser.selectedTab
		clog(`opening mandatory pinned tabs`, get_current_line())
		pref(
			`_overrides.lightwork.tabs`,
			domWindow.gBrowser.tabs.length
		)
		const pp_key = current_profile_name in profile_pinned_urls
		let pp = pp_key ? profile_pinned_urls[current_profile_name] : []
		let p = pinned_urls.concat(pp)
		for (let i = 0; i < p.length; i++) {
			const url = p[i]
			let isAlreadyPinned = false
			for (
				let j = 0;
				j < domWindow.gBrowser.tabs.length;
				j++
			) {
				let tab = domWindow.gBrowser.tabs[j]
				let browser =
					domWindow.gBrowser.getBrowserForTab(tab)
				if (
					tab.pinned &&
					url_matches(
						browser.currentURI.spec,
						url
					)
				) {
					isAlreadyPinned = true
					break
				}
			}
			// If missing, open it and force-pin it
			if (!isAlreadyPinned) {
				let tab = domWindow.gBrowser.addTab(url, {
					triggeringPrincipal:
						SsManager.getSystemPrincipal(),
					pinned: true,
				})
				// domWindow.gBrowser.selectedTab = tab
			}
		}
		domWindow.gBrowser.selectedTab = current_tab
	}, 5000)
}

try {
	let wm = Components.classes[
		'@mozilla.org/appshell/window-mediator;1'
	].getService(Components.interfaces.nsIWindowMediator)

	let window_listener = {
		onOpenWindow: function (aWindow) {
			let domWindow = aWindow
				.QueryInterface(
					Components.interfaces
						.nsIInterfaceRequestor
				)
				.getInterface(
					Components.interfaces.nsIDOMWindow
				)
			domWindow.addEventListener(
				'load',
				post_load_handler,
				false
			)
		},
		onCloseWindow: function (aWindow) {},
	}

	wm.addListener(window_listener)
} catch (e) {
	cerror(
		"we couldn' do it chief (loading your pinned windows)",
		get_current_line()
	)
}
